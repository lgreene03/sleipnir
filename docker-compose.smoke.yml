# Smoke-test overlay: swaps the live Binance connector for the in-memory
# simulator so the full pipeline runs without exchange credentials.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.smoke.yml up -d --build

services:
  sleipnir:
    environment:
      - EXCHANGE_BACKEND=sim
      # Admin endpoints fail closed without a token; set a known value so the
      # smoke test can exercise the authenticated /admin/halt path.
      - SLEIPNIR_ADMIN_TOKEN=${SLEIPNIR_ADMIN_TOKEN:-smoke-admin-token}
