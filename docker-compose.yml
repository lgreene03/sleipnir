version: '3.8'

services:
  # Redpanda provides a high-performance, single-binary Kafka-compatible message broker
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.6
    container_name: sleipnir-redpanda
    command: >
      redpanda start
      --mode dev-container
      --smp 1
      --kafka-addr PLAINTEXT://0.0.0.0:29092
      --advertise-kafka-addr PLAINTEXT://redpanda:29092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 2s
      retries: 5

  # Sleipnir Order Execution Gateway
  sleipnir:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sleipnir-gateway
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_INTENTS_TOPIC=executions.intents.v1
      - KAFKA_FILLS_TOPIC=executions.fills.v1
      - KAFKA_CONSUMER_GROUP=sleipnir-gateway
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_REST_URL=https://testnet.binance.vision
      - BINANCE_WS_URL=wss://ws-api.testnet.binance.vision/ws-api/v3
      - RATE_LIMIT_RPS=10.0
      - PORT=8080
    restart: on-failure
