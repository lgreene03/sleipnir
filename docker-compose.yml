version: '3.8'

services:
  # Redpanda provides a high-performance, single-binary Kafka-compatible message broker
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.6
    container_name: sleipnir-redpanda
    command: >
      redpanda start
      --mode dev-container
      --smp 1
      --kafka-addr PLAINTEXT://0.0.0.0:29092
      --advertise-kafka-addr PLAINTEXT://redpanda:29092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 2s
      retries: 5

  # Sleipnir Order Execution Gateway
  sleipnir:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sleipnir-gateway
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_INTENTS_TOPIC=executions.intents.v1
      - KAFKA_FILLS_TOPIC=executions.fills.v1
      - KAFKA_CONSUMER_GROUP=sleipnir-gateway
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_REST_URL=https://testnet.binance.vision
      - BINANCE_WS_URL=wss://ws-api.testnet.binance.vision/ws-api/v3
      - RATE_LIMIT_RPS=10.0
      - PORT=8080
      - DB_PATH=/app/data/sleipnir.db
    volumes:
      - sleipnir-data:/app/data
    restart: on-failure

  # Mock Huginn - Strategy Engine (dispatches intents)
  mock-huginn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-huginn
    entrypoint: ["./mock_huginn"]
    depends_on:
      sleipnir:
        condition: service_started
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_INTENTS_TOPIC=executions.intents.v1
    restart: on-failure

  # Mock Portfolio Tracker - consumes fills downstream of sleipnir.
  # Represents the huginn-side fills consumer; named "portfolio" to avoid
  # implying muninn (the feature engine) ingests execution fills (it does not).
  mock-portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-portfolio
    entrypoint: ["./mock_portfolio"]
    depends_on:
      sleipnir:
        condition: service_started
    environment:
      - KAFKA_BROKERS=redpanda:29092
      - KAFKA_FILLS_TOPIC=executions.fills.v1
      - KAFKA_CONSUMER_GROUP=mock-portfolio-tracker
    restart: on-failure

  # Prometheus Telemetry Collector
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sleipnir-prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./telemetry/alerts.yml:/etc/prometheus/alerts.yml
    depends_on:
      - sleipnir

  # Grafana Visualization Dashboards
  grafana:
    image: grafana/grafana:10.0.0
    container_name: sleipnir-grafana
    ports:
      - "3005:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./telemetry/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./telemetry/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  # OpenTelemetry stack — opt in with `--profile tracing`.
  # Tempo collects spans, Grafana renders them. The sleipnir + mock_huginn
  # processes only export when OTEL_EXPORTER_OTLP_ENDPOINT is set, so leaving
  # the tracing profile off is the default.
  tempo:
    image: grafana/tempo:2.5.0
    container_name: sleipnir-tempo
    profiles: ["tracing"]
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"  # tempo HTTP
      - "4317:4317"  # OTLP/gRPC ingest — point OTEL_EXPORTER_OTLP_ENDPOINT here
    volumes:
      - ./telemetry/tempo.yaml:/etc/tempo.yaml
    restart: on-failure

volumes:
  sleipnir-data:
