name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Verify go.mod
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out | tail -20

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: cover-${{ matrix.go-version }}
          path: cover.out

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: golangci-lint
        # Pin to v9 of the action — its default binary version is built with
        # Go 1.25, matching our go.mod. Older actions (v6) shipped v1.64.x
        # which refuses modules targeting Go > the linter's build version.
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sleipnir:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
