# golangci-lint v2 configuration for sleipnir.
#
# v2 is required because the project's go.mod targets Go 1.25 and the last
# v1 release (1.64.8) was built with Go 1.24 — it refuses to lint modules
# whose `go` directive exceeds its build version.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Bug-catchers — always on.
    - errorlint       # %w vs %v, errors.Is/As correctness
    - gosec           # security findings (HMAC, secrets, weak crypto)
    - govet           # standard vet rules
    - ineffassign     # unused assignments
    - misspell        # spelling
    - revive          # general lint
    - staticcheck     # the big one
    - unconvert       # redundant type conversions
    - unused          # unused symbols
    - whitespace      # leading/trailing blank lines in func bodies

    # Disabled pending dedicated cleanup phases of docs/ROADMAP.md:
    # - bodyclose: Phase 5 (correctness hardening of internal/exchange).
    #   ~1 finding in binance.go:310 — covered by the audit's reconciliation
    #   rewrite.
    # - errcheck: Phase 3 (interface promotion + simulator); ~20 unchecked
    #   Close()/io.ReadAll/strconv.ParseFloat across legacy paths.
    # - contextcheck: Phase 3 (gateway interface refactor); the OrderTracker
    #   methods don't take ctx today and the gateway loop is single-call-site.
    # Re-enable these in the phase that does the rework.

  settings:
    staticcheck:
      # Disable the QF (quick-fix / refactor) checks. They suggest stylistic
      # rewrites (e.g. "use a tagged switch") that aren't bug-catchers — the
      # specific QF1003 finding on gateway.go's instrument check is being
      # rewritten in Phase 6 anyway when the hardcoded BTC/ETH limits move
      # to a risk.yaml config map.
      checks: ["all", "-QF*"]
    errcheck:
      check-blank: true
      check-type-assertions: true
    gosec:
      # Skip a couple of high-noise rules:
      # - G104 (errors not checked) is covered by errcheck
      # - G115 (integer overflow conversion) fires on intentional int64→int casts
      # - G404 (math/rand) is fine for jitter / backoff (not cryptographic)
      excludes:
        - G104
        - G115
        - G404
    revive:
      rules:
        - name: exported
          disabled: true   # docstrings are nice-to-have, not a blocker

  exclusions:
    rules:
      # Test files: allow looser error handling.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # Mock binaries: allow log.Fatal idiom.
      - path: cmd/mock_(huginn|muninn)/
        linters:
          - revive

formatters:
  enable:
    - gofmt     # plain gofmt — strict enough; gofumpt's local-import grouping
                # disagrees with the project's `sleipnir/internal/...` style
                # and would force an unwanted three-group import layout
